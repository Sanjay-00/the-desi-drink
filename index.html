<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Desi Drink | Menu</title>
    <meta name="description" content="The Desi Drink: aromatic, spiced, soulful chai, coffee & bites. Browse the full menu.">
    <meta name="theme-color" content="#2C1A11">
    <link rel="icon" href="assets/logo.jpg">

    <!-- Open Graph (nice preview when the link is shared on WhatsApp/Instagram) -->
    <meta property="og:title" content="The Desi Drink">
    <meta property="og:description" content="Aromatic • Spiced • Soulful. Tap to see our menu.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="assets/logo.jpg">

    <!-- Tailwind CSS (CDN, fine for launch; see README to bundle later) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: an elegant italic serif for the cosy cafe voice, clean sans for readability -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,800;1,500;1,600;1,700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        coffee: {
                            espresso: '#2C1A11',
                            caramel: '#7A431D',
                            honey: '#EAA937',
                            latte: '#F3EDE2',
                            cream: '#FDFBF7',
                            accent: '#C2462E',
                            dark: '#1C100A',
                        }
                    },
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        serif: ['"Playfair Display"', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(122, 67, 29, 0.05); }
        ::-webkit-scrollbar-thumb { background: rgba(122, 67, 29, 0.3); border-radius: 10px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        body {
            background-color: #F3EDE2;
            background-image:
                radial-gradient(circle at 1px 1px, rgba(122,67,29,0.10) 1px, transparent 0);
            background-size: 22px 22px;
        }

        .coffee-shadow { box-shadow: 0 10px 30px -10px rgba(44, 26, 17, 0.15); }
        .golden-glow { box-shadow: 0 8px 25px -5px rgba(234, 169, 55, 0.4); }
        .active-tab { background-color: #2C1A11; color: #FDFBF7; box-shadow: 0 4px 15px rgba(44, 26, 17, 0.2); }

        @keyframes slideUp { 0% { transform: translateY(100%); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
        .animate-slideup { animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-fade { animation: fadeIn 0.25s ease-out forwards; }
        .btn-press { transition: transform 0.1s ease, filter 0.1s ease; }
        .btn-press:active { transform: scale(0.95); filter: brightness(0.9); }

        /* Hero slideshow */
        #hero-track { transition: transform 0.55s cubic-bezier(0.65, 0, 0.35, 1); }
        .hero-dot { width: 6px; height: 6px; border-radius: 999px; background: rgba(253,251,247,0.35); transition: all 0.3s ease; }
        .hero-dot.active { width: 18px; background: #EAA937; }

        /* Decorative desi divider - a soft paisley-ish squiggle */
        .desi-divider { color: rgba(122,67,29,0.35); letter-spacing: 0.5em; }

        .bestseller-crown { filter: drop-shadow(0 2px 3px rgba(0,0,0,0.25)); }

        /* Loading skeleton (plain CSS so it renders even before Tailwind's CDN script finishes) */
        .skeleton-card {
            height: 112px;
            border-radius: 24px;
            background: linear-gradient(90deg, #EFE8DA 25%, #F6F1E7 37%, #EFE8DA 63%);
            background-size: 400% 100%;
            animation: skeletonShine 1.4s ease infinite;
        }
        @keyframes skeletonShine {
            0% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Back-to-top button */
        #back-to-top {
            position: fixed;
            right: 16px;
            bottom: 20px;
            width: 44px;
            height: 44px;
            border-radius: 999px;
            background: #2C1A11;
            color: #EAA937;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px -4px rgba(44,26,17,0.4);
            border: 2px solid rgba(234,169,55,0.4);
            opacity: 0;
            pointer-events: none;
            transform: translateY(10px);
            transition: opacity 0.25s ease, transform 0.25s ease;
            z-index: 40;
        }
        #back-to-top.visible { opacity: 1; pointer-events: auto; transform: translateY(0); }
    </style>
</head>
<body class="text-coffee-espresso font-sans min-h-screen selection:bg-coffee-honey selection:text-coffee-espresso">

    <!-- Sticky Header -->
    <header class="sticky top-0 z-30 bg-coffee-cream/90 backdrop-blur-md border-b border-coffee-caramel/10 shadow-sm">
        <div class="max-w-md mx-auto px-4 py-3.5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 rounded-full overflow-hidden shadow-md border-2 border-coffee-honey flex-shrink-0">
                    <img src="assets/logo.jpg" alt="The Desi Drink logo" class="w-full h-full object-cover">
                </div>
                <div>
                    <h1 id="cafe-name" class="font-serif italic font-bold text-2xl tracking-wide text-coffee-espresso leading-none">THE DESI DRINK</h1>
                    <p id="cafe-tagline" class="text-[9px] tracking-widest uppercase font-extrabold text-coffee-caramel mt-1">Aromatic • Spiced • Soulful</p>
                </div>
            </div>
        </div>

        <!-- Category Navigation Tabs (generated from config) -->
        <div id="category-tabs" class="max-w-md mx-auto px-4 pb-3 pt-1 flex items-center gap-2 overflow-x-auto no-scrollbar"></div>
    </header>

    <main class="max-w-md mx-auto px-4 py-4 space-y-7">

        <!-- Hero Slideshow (combos) -->
        <div class="relative">
            <div id="hero-viewport" class="relative overflow-hidden rounded-3xl shadow-2xl golden-glow border border-coffee-honey/20">
                <div id="hero-track" class="flex"></div>
            </div>
            <div id="hero-dots" class="flex items-center justify-center gap-1.5 pt-3"></div>
        </div>

        <!-- Desi divider -->
        <div class="text-center text-xs desi-divider select-none">❈ ❈ ❈</div>

        <!-- Search Bar -->
        <div class="relative">
            <input type="text" id="menu-search" oninput="filterMenu()" placeholder="Search chai, bun maska, garlic bread..." aria-label="Search the menu" class="w-full pl-11 pr-4 py-3.5 bg-coffee-cream border border-coffee-caramel/20 rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-coffee-honey focus:border-transparent shadow-sm placeholder:text-coffee-espresso/40">
            <svg class="w-5 h-5 text-coffee-caramel/50 absolute left-4 top-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
        </div>

        <!-- Menu Container (skeleton placeholders shown until JS renders real items) -->
        <div id="menu-items-container" class="space-y-4">
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
        </div>

        <!-- About / Our Story -->
        <section class="bg-coffee-cream rounded-3xl p-6 shadow-sm border border-coffee-caramel/5 coffee-shadow space-y-2">
            <h3 id="about-heading" class="font-serif italic font-bold text-xl text-coffee-espresso">Our Story</h3>
            <p id="about-text" class="text-xs text-coffee-caramel/80 leading-relaxed"></p>
        </section>

        <!-- Hours -->
        <section class="bg-coffee-cream rounded-3xl p-6 shadow-sm border border-coffee-caramel/5 coffee-shadow space-y-3">
            <div class="flex items-center gap-2">
                <span class="text-lg">🕒</span>
                <h3 class="font-serif italic font-bold text-xl text-coffee-espresso">Opening Hours</h3>
            </div>
            <div id="hours-list" class="space-y-1.5"></div>
        </section>

        <!-- Find Us -->
        <section class="bg-coffee-cream rounded-3xl p-6 shadow-sm border border-coffee-caramel/5 coffee-shadow space-y-3">
            <div class="flex items-center gap-2">
                <span class="text-lg">📍</span>
                <h3 class="font-serif italic font-bold text-xl text-coffee-espresso">Find Us</h3>
            </div>
            <p id="cafe-address" class="text-xs text-coffee-caramel/80 leading-relaxed"></p>
            <a id="maps-link" href="#" target="_blank" rel="noopener" class="inline-flex items-center gap-2 px-5 py-3 bg-coffee-espresso text-coffee-cream rounded-xl text-xs font-extrabold shadow-md btn-press border border-coffee-honey/20">
                <span>Open in Google Maps</span>
                <span class="text-coffee-honey">➔</span>
            </a>
        </section>

        <!-- Contact / Social -->
        <section class="grid grid-cols-2 gap-3">
            <a id="call-link" href="#" class="flex flex-col items-center justify-center gap-1.5 py-5 bg-coffee-espresso text-coffee-cream rounded-3xl shadow-md btn-press border border-coffee-honey/20">
                <span class="text-2xl">📞</span>
                <span class="text-xs font-extrabold uppercase tracking-wider">Call Us</span>
            </a>
            <a id="instagram-link" href="#" target="_blank" rel="noopener" class="flex flex-col items-center justify-center gap-1.5 py-5 bg-gradient-to-br from-coffee-accent to-coffee-caramel text-coffee-cream rounded-3xl shadow-md btn-press border border-coffee-honey/20">
                <span class="text-2xl">📸</span>
                <span class="text-xs font-extrabold uppercase tracking-wider">Instagram</span>
            </a>
        </section>

        <!-- Footer -->
        <footer class="text-center py-6 space-y-1">
            <p id="footer-name" class="font-serif italic font-bold text-lg text-coffee-espresso">THE DESI DRINK</p>
            <p class="text-[10px] text-coffee-caramel/50 uppercase tracking-widest">Made with authentic Indian spices & warmth ❤</p>
        </footer>

    </main>

    <!-- Back to top -->
    <button id="back-to-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})" aria-label="Back to top">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 15l7-7 7 7"/>
        </svg>
    </button>

    <!-- ===== Configuration (edit config.js for all content) ===== -->
    <script src="config.js"></script>

    <script>
        const CFG = window.CAFE_CONFIG || {};
        const CAFEMENU = CFG.menu || [];

        let appState = {
            activeCategory: 'all',
            searchQuery: '',
        };

        const buildCategoryTabs = () => {
            const wrap = document.getElementById('category-tabs');
            wrap.innerHTML = '';
            const cats = ['all', ...(CFG.categories || [])];
            cats.forEach((cat, i) => {
                const btn = document.createElement('button');
                btn.dataset.cat = cat;
                btn.className = `px-4 py-2 rounded-xl text-xs font-extrabold uppercase tracking-wider transition-all whitespace-nowrap btn-press ${i === 0 ? 'active-tab text-coffee-cream' : 'text-coffee-espresso/60'}`;
                btn.innerText = cat === 'all' ? 'All Sips' : cat;
                btn.onclick = () => switchCategory(cat);
                wrap.appendChild(btn);
            });
        };

        const DAY_LABELS = {
            'Mon Special': 'Monday',
            'Tue Special': 'Tuesday',
            'Wed Special': 'Wednesday',
            'Thu Special': 'Thursday',
            'Fri Special': 'Friday',
            'Sat Special': 'Saturday',
            'Sun Special': 'Sunday',
        };

        const buildMenuCard = (item) => {
            const card = document.createElement('div');
            card.className = "bg-coffee-cream rounded-3xl p-3.5 flex gap-4 shadow-sm border border-coffee-caramel/5 hover:border-coffee-honey/45 transition-all duration-300 animate-slideup coffee-shadow items-center";

            let badgeClass = "bg-coffee-honey/20 text-coffee-caramel";
            if (item.category === 'Warm Brews')      badgeClass = "bg-coffee-accent/15 text-coffee-accent border border-coffee-accent/20";
            else if (item.category === 'Bites & Snacks') badgeClass = "bg-coffee-caramel/15 text-coffee-caramel border border-coffee-caramel/20";
            else if (item.category === 'Cool Sips')  badgeClass = "bg-teal-700/10 text-teal-800 border border-teal-500/20";
            else if (item.category === 'Desserts')   badgeClass = "bg-pink-600/10 text-pink-700 border border-pink-400/20";

            card.innerHTML = `
                <div class="w-28 h-28 sm:w-32 sm:h-32 flex-shrink-0 relative rounded-2xl overflow-hidden border border-coffee-caramel/10 bg-coffee-latte shadow-inner aspect-square">
                    ${item.image
                        ? `<img src="${item.image}" alt="${item.name}" loading="lazy" width="128" height="128"
                             class="w-full h-full object-cover object-[center_25%] transition-all duration-500 opacity-0"
                             onload="this.classList.remove('opacity-0')"
                             onerror="this.parentElement.innerHTML='<div class=&quot;w-full h-full flex items-center justify-center text-3xl&quot;>☕</div>'">`
                        : `<div class="w-full h-full flex items-center justify-center text-3xl">☕</div>`}
                    ${item.bestseller ? `<span class="absolute top-1 left-1 text-[13px] bestseller-crown">👑</span>` : ''}
                </div>
                <div class="flex-grow space-y-1.5 min-w-0">
                    <div class="flex flex-wrap items-center gap-1.5">
                        ${item.category === 'Breakfast' ? `<span class="text-[9px] uppercase font-black tracking-wider px-2 py-0.5 rounded-lg bg-amber-500 text-white">${DAY_LABELS[item.badge] || item.badge}</span>` : `<span class="text-[9px] uppercase font-black tracking-wider px-2 py-0.5 rounded-lg ${badgeClass}">${item.badge || ''}</span>`}
                        <span class="text-[9px] uppercase font-bold tracking-wider text-coffee-espresso/45">${item.category}</span>
                    </div>
                    <h3 class="font-serif italic font-bold text-lg text-coffee-espresso leading-snug">${item.name}</h3>
                    <p class="text-[11px] text-coffee-caramel/75 leading-relaxed line-clamp-2">${item.desc || ''}</p>
                    <div class="pt-1">
                        <span class="font-serif font-black text-coffee-caramel text-lg">₹${item.price}</span>
                        ${(() => {
                            const sizeOpt = (item.customize || []).find(c => c.name === 'Size' || c.name === 'Portion');
                            if (!sizeOpt) return '';
                            return '<div class="flex flex-wrap gap-1 mt-1">' +
                                sizeOpt.options.map(o =>
                                    `<span class="text-[9px] px-1.5 py-0.5 rounded-md bg-coffee-caramel/10 text-coffee-caramel/80 font-semibold border border-coffee-caramel/15">${o.replace(/Rs\./g, '₹')}</span>`
                                ).join('') +
                            '</div>';
                        })()}
                    </div>
                </div>`;
            return card;
        };

        const itemMatchesQuery = (item, query) => {
            if (!query) return true;
            const haystackWords = `${item.name} ${item.desc || ''}`.toLowerCase().split(/[^a-z0-9]+/);
            const queryWords = query.toLowerCase().split(/\s+/).filter(Boolean);
            return queryWords.every(qw => haystackWords.some(hw => hw.startsWith(qw)));
        };

        const renderMenu = () => {
            const container = document.getElementById('menu-items-container');
            container.innerHTML = '';

            const filtered = CAFEMENU.filter(item => {
                const matchesCategory = appState.activeCategory === 'all' || item.category === appState.activeCategory;
                const matchesSearch = itemMatchesQuery(item, appState.searchQuery);
                return matchesCategory && matchesSearch;
            });

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12 space-y-3 animate-fade">
                        <span class="text-4xl text-coffee-caramel/50">☕</span>
                        <p class="text-sm font-semibold text-coffee-espresso/50">No items match your search.</p>
                    </div>`;
                return;
            }

            filtered.forEach(item => container.appendChild(buildMenuCard(item)));
        };

        const switchCategory = (category) => {
            appState.activeCategory = category;
            document.querySelectorAll('#category-tabs button').forEach(btn => {
                const isActive = btn.dataset.cat === category;
                btn.classList.toggle('active-tab', isActive);
                btn.classList.toggle('text-coffee-cream', isActive);
                btn.classList.toggle('text-coffee-espresso/60', !isActive);
            });
            renderMenu();
        };

        const filterMenu = () => {
            appState.searchQuery = document.getElementById('menu-search').value.trim();
            renderMenu();
        };

        /* ---------------- Hero combo slideshow ---------------- */
        let heroIndex = 0;
        let heroTimer = null;

        const buildHeroSlideshow = () => {
            const slides = CFG.heroSlides || (CFG.hero ? [CFG.hero] : []);
            const track = document.getElementById('hero-track');
            const dotsWrap = document.getElementById('hero-dots');
            track.innerHTML = '';
            dotsWrap.innerHTML = '';

            if (slides.length === 0) {
                document.getElementById('hero-viewport').style.display = 'none';
                return;
            }

            slides.forEach((h, i) => {
                const slide = document.createElement('div');
                slide.className = "relative w-full flex-shrink-0 overflow-hidden bg-gradient-to-br from-coffee-espresso to-coffee-dark text-coffee-cream p-6 min-h-[230px] flex flex-col justify-end";
                slide.innerHTML = `
                    <img src="${h.image || ''}" alt="${h.title || ''}" class="absolute inset-0 w-full h-full object-cover object-[center_25%] opacity-45" ${i === 0 ? 'loading="eager" fetchpriority="high"' : 'loading="lazy"'}>
                    <div class="absolute inset-0 bg-gradient-to-t from-coffee-dark via-coffee-dark/50 to-transparent"></div>
                    <div class="relative z-10 space-y-3">
                        <span class="inline-block px-3 py-1 bg-coffee-honey text-coffee-espresso text-[10px] uppercase font-extrabold rounded-lg tracking-wider">${h.badge || ''}</span>
                        <h2 class="font-serif italic font-bold text-3xl leading-tight text-coffee-cream">${h.title || ''}</h2>
                        <p class="text-xs text-coffee-cream/85 font-medium leading-relaxed">${h.desc || ''}</p>
                        <div class="pt-1">
                            <span class="inline-block px-5 py-3 bg-coffee-honey text-coffee-espresso rounded-xl text-xs font-extrabold shadow-md">${h.ctaLabel || 'Combo Special'}${h.price != null ? ` • ₹${h.price}` : ''}</span>
                        </div>
                    </div>`;
                track.appendChild(slide);

                if (slides.length > 1) {
                    const dot = document.createElement('span');
                    dot.className = `hero-dot ${i === 0 ? 'active' : ''}`;
                    dot.onclick = () => goToHeroSlide(i);
                    dotsWrap.appendChild(dot);
                }
            });

            if (slides.length > 1) startHeroAutoplay(slides.length);
        };

        const goToHeroSlide = (i) => {
            const slides = CFG.heroSlides || (CFG.hero ? [CFG.hero] : []);
            heroIndex = (i + slides.length) % slides.length;
            document.getElementById('hero-track').style.transform = `translateX(-${heroIndex * 100}%)`;
            document.querySelectorAll('#hero-dots .hero-dot').forEach((d, idx) => d.classList.toggle('active', idx === heroIndex));
        };

        const startHeroAutoplay = (count) => {
            if (heroTimer) clearInterval(heroTimer);
            heroTimer = setInterval(() => goToHeroSlide(heroIndex + 1), 4500);

            // basic swipe support
            const viewport = document.getElementById('hero-viewport');
            let startX = null;
            viewport.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; }, { passive: true });
            viewport.addEventListener('touchend', (e) => {
                if (startX == null) return;
                const delta = e.changedTouches[0].clientX - startX;
                if (Math.abs(delta) > 40) goToHeroSlide(heroIndex + (delta < 0 ? 1 : -1));
                startX = null;
            }, { passive: true });
        };

        const applyCafeContent = () => {
            const c = CFG.cafe || {};
            const setText = (id, val) => { const el = document.getElementById(id); if (el && val != null) el.innerText = val; };

            setText('cafe-name', c.name);
            setText('footer-name', c.name);
            setText('cafe-tagline', c.tagline);
            document.title = `${c.name || 'The Desi Drink'} | Menu`;

            const a = CFG.about || {};
            setText('about-heading', a.heading);
            setText('about-text', a.text);

            const hoursList = document.getElementById('hours-list');
            hoursList.innerHTML = '';
            (c.hours || []).forEach(row => {
                const div = document.createElement('div');
                div.className = "flex justify-between text-xs";
                div.innerHTML = `<span class="font-bold text-coffee-espresso">${row.day}</span><span class="text-coffee-caramel/80 font-semibold">${row.time}</span>`;
                hoursList.appendChild(div);
            });

            setText('cafe-address', c.address);
            const maps = document.getElementById('maps-link');
            if (maps && c.mapsLink) maps.href = c.mapsLink;

            const call = document.getElementById('call-link');
            if (call && c.phone) call.href = `tel:${c.phone}`;

            const ig = document.getElementById('instagram-link');
            if (ig) {
                if (c.instagram) ig.href = c.instagram;
                else ig.style.display = 'none';
            }
        };

        const initBackToTop = () => {
            const btn = document.getElementById('back-to-top');
            window.addEventListener('scroll', () => {
                btn.classList.toggle('visible', window.scrollY > 600);
            }, { passive: true });
        };

        const init = () => {
            if (!window.CAFE_CONFIG) {
                document.getElementById('menu-items-container').innerHTML =
                    '<p class="text-center text-sm text-coffee-accent py-8">Could not load config.js, check the file is present.</p>';
                return;
            }
            applyCafeContent();
            buildHeroSlideshow();
            buildCategoryTabs();
            renderMenu();
            initBackToTop();
        };

        init();
    </script>
</body>
</html>
